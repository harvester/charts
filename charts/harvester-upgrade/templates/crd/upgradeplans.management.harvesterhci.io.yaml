{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
    annotations:
        {{- if .Values.crd.keep }}
        "helm.sh/resource-policy": keep
        {{- end }}
        controller-gen.kubebuilder.io/version: v0.18.0
    name: upgradeplans.management.harvesterhci.io
spec:
    group: management.harvesterhci.io
    names:
        kind: UpgradePlan
        listKind: UpgradePlanList
        plural: upgradeplans
        shortNames:
            - up
            - ups
        singular: upgradeplan
    scope: Cluster
    versions:
        - additionalPrinterColumns:
            - jsonPath: .spec.version
              name: VERSION
              type: string
            - jsonPath: .status.currentPhase
              name: CURRENTPHASE
              type: string
            - jsonPath: .status.conditions[?(@.type=='Available')].status
              name: AVAILABLE
              type: string
            - jsonPath: .status.conditions[?(@.type=='Progressing')].status
              name: PROGRESSING
              type: string
            - jsonPath: .status.conditions[?(@.type=='Degraded')].status
              name: DEGRADED
              type: string
            - jsonPath: .metadata.creationTimestamp
              name: AGE
              type: date
          name: v1beta1
          schema:
            openAPIV3Schema:
                description: UpgradePlan is the Schema for the upgradeplans API
                properties:
                    apiVersion:
                        description: |-
                            APIVersion defines the versioned schema of this representation of an object.
                            Servers should convert recognized schemas to the latest internal value, and
                            may reject unrecognized values.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                        type: string
                    kind:
                        description: |-
                            Kind is a string value representing the REST resource this object represents.
                            Servers may infer this from the endpoint the client submits requests to.
                            Cannot be updated.
                            In CamelCase.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                    metadata:
                        type: object
                    spec:
                        description: spec defines the desired state of UpgradePlan
                        properties:
                            force:
                                description: force indicates the UpgradePlan will be forcibly applied, ignoring any pre-upgrade check failures. Default to "false".
                                type: boolean
                            image:
                                description: |-
                                    image references the name of a pre-uploaded VirtualMachineImage in the
                                    harvester-system namespace to use as the upgrade ISO. When set, the
                                    ISODownloading phase uses this existing VMImage instead of downloading a new one.
                                type: string
                            imagePreloadOption:
                                description: imagePreloadOption configures image preload behavior including concurrency control.
                                properties:
                                    concurrency:
                                        description: |-
                                            concurrency controls how many nodes preload images simultaneously.
                                            When nil or zero, all Harvester-managed nodes preload concurrently.
                                            When positive, the value is used as the SUC plan concurrency (capped at node count).
                                            When negative, image preloading is skipped entirely.
                                        type: integer
                                type: object
                            nodeUpgradeOption:
                                description: nodeUpgradeOption configures node upgrade behavior including pause/unpause control.
                                properties:
                                    pauseNodes:
                                        description: |-
                                            pauseNodes lists specific node names to pause before PreDraining.
                                            When non-empty, only the listed nodes are paused; all other nodes proceed
                                            automatically. When empty (or when nodeUpgradeOption is nil), no nodes are
                                            paused. Removing a node from this list unpauses it. To pause all nodes,
                                            list every node name explicitly.
                                        items:
                                            minLength: 1
                                            type: string
                                        type: array
                                        x-kubernetes-list-type: set
                                type: object
                            restoreVM:
                                description: |-
                                    restoreVM enables automatic restoration of non-live-migratable VMs
                                    that were shut down during node upgrade. Default to false.
                                type: boolean
                            upgrade:
                                description: |-
                                    upgrade can be specified to opt for any other specific upgrade image. If not provided, the version resource name is used.
                                    For instance, specifying "dev" for the field can go for the "rancher/harvester-upgrade:dev" image.
                                type: string
                            version:
                                description: |-
                                    version refers to the corresponding version resource.
                                    When spec.image is set, this field is optional and no Version CR lookup is performed.
                                minLength: 1
                                type: string
                        type: object
                        x-kubernetes-validations:
                            - message: spec.upgrade is immutable after creation
                              rule: has(self.upgrade) == has(oldSelf.upgrade) && (!has(self.upgrade) || self.upgrade == oldSelf.upgrade)
                            - message: spec.image is immutable after creation
                              rule: has(self.image) == has(oldSelf.image) && (!has(self.image) || self.image == oldSelf.image)
                            - message: spec.version is immutable after creation
                              rule: has(self.version) == has(oldSelf.version) && (!has(self.version) || self.version == oldSelf.version)
                            - message: at least one of spec.version or spec.image must be set
                              rule: has(self.version) || has(self.image)
                    status:
                        description: status defines the observed state of UpgradePlan
                        properties:
                            conditions:
                                description: |-
                                    conditions represent the current state of the UpgradePlan resource.
                                    Each condition has a unique type and reflects the status of a specific aspect of the resource.

                                    Standard condition types include:
                                    - "Available": the resource is fully functional
                                    - "Progressing": the resource is being created or updated
                                    - "Degraded": the resource failed to reach or maintain its desired state

                                    The status of each condition is one of True, False, or Unknown.
                                items:
                                    description: Condition contains details for one aspect of the current state of this API Resource.
                                    properties:
                                        lastTransitionTime:
                                            description: |-
                                                lastTransitionTime is the last time the condition transitioned from one status to another.
                                                This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                                            format: date-time
                                            type: string
                                        message:
                                            description: |-
                                                message is a human readable message indicating details about the transition.
                                                This may be an empty string.
                                            maxLength: 32768
                                            type: string
                                        observedGeneration:
                                            description: |-
                                                observedGeneration represents the .metadata.generation that the condition was set based upon.
                                                For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                                                with respect to the current state of the instance.
                                            format: int64
                                            minimum: 0
                                            type: integer
                                        reason:
                                            description: |-
                                                reason contains a programmatic identifier indicating the reason for the condition's last transition.
                                                Producers of specific condition types may define expected values and meanings for this field,
                                                and whether the values are considered a guaranteed API.
                                                The value should be a CamelCase string.
                                                This field may not be empty.
                                            maxLength: 1024
                                            minLength: 1
                                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                                            type: string
                                        status:
                                            description: status of the condition, one of True, False, Unknown.
                                            enum:
                                                - "True"
                                                - "False"
                                                - Unknown
                                            type: string
                                        type:
                                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                                            maxLength: 316
                                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                                            type: string
                                    required:
                                        - lastTransitionTime
                                        - message
                                        - reason
                                        - status
                                        - type
                                    type: object
                                type: array
                                x-kubernetes-list-map-keys:
                                    - type
                                x-kubernetes-list-type: map
                            currentPhase:
                                description: currentPhase shows what overall phase the UpgradePlan resource is in.
                                type: string
                            isoImageID:
                                description: |-
                                    isoImageID refers to the name of the VM image in the harvester-system
                                    namespace that will be used for the upgrade.
                                type: string
                            nodeUpgradeStatuses:
                                additionalProperties:
                                    properties:
                                        message:
                                            type: string
                                        reason:
                                            type: string
                                        state:
                                            description: NodeUpgradeState represents a node's position in the upgrade lifecycle.
                                            type: string
                                    type: object
                                description: nodeStatuses reflect each node's upgrade status for node specific tasks.
                                type: object
                                x-kubernetes-map-type: atomic
                            phaseTransitionTimestamps:
                                description: phaseTransitionTimestamp is the timestamp of when the last phase change occurred.
                                items:
                                    properties:
                                        phase:
                                            description: UpgradePlanPhase defines what overall phase UpgradePlan is in
                                            type: string
                                        phaseTransitionTimestamp:
                                            format: date-time
                                            type: string
                                    required:
                                        - phase
                                        - phaseTransitionTimestamp
                                    type: object
                                type: array
                                x-kubernetes-list-type: atomic
                            previousVersion:
                                description: previousVersion is the Harvester version before upgrade.
                                type: string
                            provisionGeneration:
                                description: |-
                                    provisionGeneration records the provisionGeneration value set on the
                                    Cluster resource during the NodeUpgrade phase. Used as an idempotency
                                    guard so the Cluster is patched exactly once per upgrade.
                                type: integer
                            releaseMetadata:
                                description: releaseMetadata reflects the essential metadata extracted from the artifact.
                                properties:
                                    harvester:
                                        type: string
                                    harvesterChart:
                                        type: string
                                    kubernetes:
                                        type: string
                                    minUpgradableVersion:
                                        type: string
                                    monitoringChart:
                                        type: string
                                    os:
                                        type: string
                                    rancher:
                                        type: string
                                type: object
                            singleNode:
                                description: |-
                                    singleNode records the name of the single node in a single-node cluster.
                                    Empty for multi-node clusters. Set during the Initialize phase.
                                type: string
                            version:
                                description: version is the snapshot of the associated Version resource.
                                properties:
                                    isoChecksum:
                                        description: isoChecksum is the checksum of the ISO.
                                        type: string
                                    isoURL:
                                        description: isoURL is the URL to download the ISO from.
                                        type: string
                                required:
                                    - isoURL
                                type: object
                        type: object
                required:
                    - spec
                type: object
          served: true
          storage: true
          subresources:
            status: {}
{{- end }}
