# Default values for harvester-cloud-provider.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicasCount: 1

image:
  repository: rancher/harvester-cloud-provider
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "master-head"

cloudConfigPath: "/var/lib/rancher/rke2/etc/config-files/cloud-provider-config"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector:
  kubernetes.io/os: linux

tolerations:
- effect: NoSchedule
  key: node.cloudprovider.kubernetes.io/uninitialized
  operator: Equal
  value: "true"
- effect: NoSchedule
  key: node-role.kubernetes.io/control-plane
  operator: Equal
- effect: NoExecute
  key: node-role.kubernetes.io/etcd
  operator: Equal
- key: cattle.io/os
  operator: Equal
  value: "linux"
  effect: NoSchedule

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - harvester-cloud-provider
        topologyKey: kubernetes.io/hostname

global:
  cattle:
    systemDefaultRegistry: ""
    clusterName: ""

kube-vip:
  enabled: true
  tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists
  - effect: NoExecute
    key: node-role.kubernetes.io/etcd
    operator: Exists
  image:
    repository: rancher/mirrored-kube-vip-kube-vip-iptables
    tag: v1.1.2
  env:
    vip_interface: ""
    vip_arp: "true"
    lb_enable: "true"
    lb_port: "6443"
    # vip_subnet defines the prefix length for the virtual IP
    # vip_subnet: "32" for IPv4, vip_subnet: "32,128" for dual-stack
    # Note: replaced legacy 'vip_cidr' which is no longer supported in newer kube-vip versions
    vip_subnet: "32"
    cp_enable: "false"
    # svc_enable and svc_election replace old option `enable_service_security`
    svc_enable: "true"
    # To get service `externalTrafficPolicy: Local` working, set `svc_election` to "true"
    # and also remove the following `affinity`, as kube-vip needs to be deployed on each node
    svc_election: "false"
    vip_leaderelection: "false"
    prometheus_server: ":2112"
  podMonitor:
    enabled: false
  # By default, kube-vip is deployed on control-plane
  # if svc_election is enabled, remove the `affinity`
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        # For RKE1
        - matchExpressions:
          - key: node-role.kubernetes.io/controlplane
            operator: Exists
        # For RKE2
        - matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
